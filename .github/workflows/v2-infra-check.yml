name: V2 Infra Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Start App
        run: |
          npm run dev -- --hostname 127.0.0.1 --port 3000 > .next/dev.log 2>&1 &
          echo $! > .next/dev.pid
          for i in {1..60}; do
            if curl -sSf http://127.0.0.1:3000/ > /dev/null; then
              echo "app ready"
              exit 0
            fi
            sleep 1
          done
          echo "app boot timeout"
          tail -n 120 .next/dev.log || true
          exit 1

      - name: V2 Acceptance Check
        run: npm run check:v2:md

      - name: Stage Snapshot Trigger
        run: npm run snapshot:stage

      - name: Stage Bundle Export
        run: npm run snapshot:bundle

      - name: Upload Acceptance Markdown
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v2-acceptance-check
          path: docs/v2-acceptance-check.md
          if-no-files-found: ignore

      - name: Upload Stage Snapshot Manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-snapshot-manifest
          path: docs/stage-snapshot-manifest.md
          if-no-files-found: ignore

      - name: Upload Stage Delivery Bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-delivery-bundle
          path: docs/stage-delivery-bundle-*.zip
          if-no-files-found: ignore

      - name: Stop App
        if: always()
        run: |
          if [ -f .next/dev.pid ]; then
            kill "$(cat .next/dev.pid)" || true
          fi
